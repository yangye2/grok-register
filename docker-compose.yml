services:
  warp:
    image: caomingjun/warp:latest
    restart: unless-stopped
    environment:
      WARP_SLEEP: 2
    cap_add:
      - NET_ADMIN
    ports:
      - "127.0.0.1:1080:1080"

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    restart: unless-stopped
    shm_size: 1gb
    profiles:
      - optional
    depends_on:
      - warp

  console:
    image: ${GROK_REGISTER_IMAGE:-ghcr.io/yangye2/grok-register:latest}
    working_dir: /workspace
    command: python /workspace/apps/console/app.py
    shm_size: 1gb
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      GROK_REGISTER_AUTH_USER: ${GROK_REGISTER_AUTH_USER:-admin}
      GROK_REGISTER_AUTH_PASSWORD: ${GROK_REGISTER_AUTH_PASSWORD:-}
      GROK_REGISTER_AUTH_SECRET: ${GROK_REGISTER_AUTH_SECRET:-}
      GROK_REGISTER_AUTH_SESSION_HOURS: ${GROK_REGISTER_AUTH_SESSION_HOURS:-168}
      GROK_REGISTER_SOURCE_DIR: /workspace
      GROK_REGISTER_PYTHON: /usr/local/bin/python
      GROK_REGISTER_CONSOLE_HOST: 0.0.0.0
      GROK_REGISTER_CONSOLE_PORT: ${GROK_STACK_CONSOLE_PORT:-18600}
      # default only; console settings max_concurrent_tasks overrides this after save
      GROK_REGISTER_CONSOLE_MAX_CONCURRENT_TASKS: 1
      GROK_REGISTER_DEFAULT_RUN_COUNT: ${GROK_REGISTER_DEFAULT_RUN_COUNT:-50}
      GROK_REGISTER_DEFAULT_PROXY: ${GROK_REGISTER_DEFAULT_PROXY:-socks5://warp:1080}
      GROK_REGISTER_DEFAULT_BROWSER_PROXY: ${GROK_REGISTER_DEFAULT_BROWSER_PROXY:-socks5://warp:1080}
      GROK_REGISTER_DEFAULT_TEMP_MAIL_API_BASE: ${GROK_REGISTER_DEFAULT_TEMP_MAIL_API_BASE:-}
      GROK_REGISTER_DEFAULT_TEMP_MAIL_ADMIN_PASSWORD: ${GROK_REGISTER_DEFAULT_TEMP_MAIL_ADMIN_PASSWORD:-}
      GROK_REGISTER_DEFAULT_TEMP_MAIL_DOMAIN: ${GROK_REGISTER_DEFAULT_TEMP_MAIL_DOMAIN:-}
      GROK_REGISTER_DEFAULT_TEMP_MAIL_SITE_PASSWORD: ${GROK_REGISTER_DEFAULT_TEMP_MAIL_SITE_PASSWORD:-}
      GROK_REGISTER_DEFAULT_CPA_EXPORT_ENABLED: ${GROK_REGISTER_DEFAULT_CPA_EXPORT_ENABLED:-true}
      GROK_REGISTER_DEFAULT_CPA_AUTH_DIR: ${GROK_REGISTER_DEFAULT_CPA_AUTH_DIR:-/workspace/cpa_auths}
      GROK_REGISTER_DEFAULT_CPA_PROXY: ${GROK_REGISTER_DEFAULT_CPA_PROXY:-}
      GROK_REGISTER_DEFAULT_CPA_HEADLESS: ${GROK_REGISTER_DEFAULT_CPA_HEADLESS:-false}
      GROK_REGISTER_DEFAULT_CPA_MINT_TIMEOUT_SEC: ${GROK_REGISTER_DEFAULT_CPA_MINT_TIMEOUT_SEC:-300}
      CPA_ALLOW_HEADLESS: ${CPA_ALLOW_HEADLESS:-false}
      CPA_CLOUD_UPLOAD_ENABLED: ${CPA_CLOUD_UPLOAD_ENABLED:-false}
      CPA_CLOUD_API_BASE: ${CPA_CLOUD_API_BASE:-}
      CPA_CLOUD_MANAGEMENT_KEY: ${CPA_CLOUD_MANAGEMENT_KEY:-}
      CPA_CLOUD_UPLOAD_TIMEOUT: ${CPA_CLOUD_UPLOAD_TIMEOUT:-30}
      CPA_CLOUD_UPLOAD_RETRIES: ${CPA_CLOUD_UPLOAD_RETRIES:-3}
    ports:
      - "${GROK_STACK_CONSOLE_BIND:-127.0.0.1}:${GROK_STACK_CONSOLE_PORT:-18600}:18600"
    volumes:
      - ./runtime/console:/workspace/apps/console/runtime
      - ./runtime/cpa_auths:/workspace/cpa_auths
    restart: unless-stopped
    depends_on:
      - warp
